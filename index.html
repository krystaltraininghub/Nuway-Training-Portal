// ─── Storage helpers (localStorage) ───────────────────────────────────────────
async function load(key) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
  catch { return null; }
}
async function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); return { ok: true }; }
  catch (err) {
    const isQuota = err && (err.code === 22 || err.code === 1014 || /quota/i.test(err.name || "") || /quota/i.test(err.message || ""));
    return { ok: false, quota: isQuota, message: err && err.message };
  }
}
function storageBytes() {
  try { let n = 0; for (let i = 0; i < localStorage.length; i++) { const k = localStorage.key(i); n += (localStorage.getItem(k) || "").length + k.length; } return n; }
  catch { return 0; }
}
// View link helper — handles data: URLs by converting to a blob URL (modern browsers block top-level data: navigation)
function viewUrl(url) {
  if (!url) return;
  if (url.startsWith("data:")) {
    fetch(url).then(r => r.blob()).then(blob => {
      const blobUrl = URL.createObjectURL(blob);
      window.open(blobUrl, "_blank");
      setTimeout(() => URL.revokeObjectURL(blobUrl), 60000);
    }).catch(e => alert("Could not open the file: " + e.message));
  } else {
    window.open(url, "_blank");
  }
}

// Apply theme to CSS variables
function applyTheme(t) {
  const r = document.documentElement;
  r.style.setProperty("--c-dark",   t.colorDark);
  r.style.setProperty("--c-cream",  t.colorCream);
  r.style.setProperty("--c-silver", t.colorSilver);
  r.style.setProperty("--c-gold",   t.colorGold);
  r.style.setProperty("--c-white",  t.colorWhite);
  r.style.setProperty("--c-text",   t.colorText);
  r.style.setProperty("--hfont",    t.headingFont);
  r.style.setProperty("--bfont",    t.bodyFont);
  document.body.style.fontSize = (t.fontSize || 15) + "px";
}

// Helper to build B colour-tokens object from a theme
function makeB(t) {
  return {
    dark: t.colorDark, cream: t.colorCream, silver: t.colorSilver,
    gold: t.colorGold, white: t.colorWhite, text: t.colorText,
    hfont: t.headingFont, bfont: t.bodyFont,
  };
}

function Btn({ children, onClick, variant = "primary", small, style: s, disabled, B }) {
  const base = {
    display: "inline-flex", alignItems: "center", gap: 6,
    padding: small ? "7px 16px" : "10px 22px",
    fontSize: small ? 12 : 13, fontWeight: 600,
    letterSpacing: "0.06em", textTransform: "uppercase",
    border: "none", cursor: disabled ? "not-allowed" : "pointer",
    transition: "all 0.2s", borderRadius: 2, opacity: disabled ? 0.5 : 1,
  };
  const variants = {
    primary: { background: B.dark, color: B.cream },
    outline: { background: "transparent", color: B.dark, border: `1.5px solid ${B.dark}` },
    ghost: { background: "transparent", color: B.dark, border: `1.5px solid ${B.silver}` },
    danger: { background: "#c0392b", color: "#fff" },
    gold: { background: B.gold, color: "#fff" },
  };
  return <button onClick={onClick} disabled={disabled} className="btn-hover"
    style={{ ...base, ...variants[variant], ...s }}>{children}</button>;
}

function Input({ label, value, onChange, type = "text", placeholder, rows, hint, B }) {
  const fieldStyle = {
    width: "100%", padding: "9px 12px",
    border: `1.5px solid ${B.silver}`, fontSize: 13, color: B.dark, background: "#fff",
    outline: "none", borderRadius: 2, fontFamily: B.bfont, transition: "border-color 0.2s",
  };
  return (
    <div style={{ marginBottom: 14 }}>
      {label && <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", color: "#888", marginBottom: 5 }}>{label}</div>}
      {rows
        ? <textarea value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={rows} style={{ ...fieldStyle, resize: "vertical" }} />
        : <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} style={fieldStyle} />}
      {hint && <div style={{ fontSize: 11, color: "#999", marginTop: 4 }}>{hint}</div>}
    </div>
  );
}

// LOGIN SCREEN
// ════════════════════════════════════════════════════════════════════
function LoginScreen({ onLogin, content, B }) {
  const [store, setStore] = useState("");
  const [code, setCode] = useState("");
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);

  async function handleLogin() {
    if (!store.trim()) { setErr("Please select your store."); return; }
    if (!code) { setErr("Please enter your access code."); return; }
    setLoading(true); setErr("");
    const staffCode = content.staffCode || DEFAULT_STAFF_CODE;
    if (code === ADMIN_CODE) {
      onLogin({ store: "Admin — Krystal", isAdmin: true });
    } else if (code === staffCode) {
      const existing = (await load("logins")) || [];
      existing.push({ store: store.trim(), ts: Date.now() });
      await save("logins", existing);
      onLogin({ store: store.trim(), isAdmin: false });
    } else {
      setErr("Incorrect access code. Please contact Krystal on " + content.login.needAccessNumber + ".");
    }
    setLoading(false);
  }

  return (
    <div style={{ minHeight: "100vh", background: B.dark, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div className="fade-in" style={{ background: B.white, width: 420, maxWidth: "100%", boxShadow: "0 40px 80px rgba(0,0,0,0.4)" }}>
        <div style={{ background: B.dark, padding: "36px 36px 28px", textAlign: "center" }}>
          <img src={content.logoUrl} alt="Logo" style={{ height: 48, objectFit: "contain", marginBottom: 16 }}
            onError={e => { e.target.style.display = "none"; }} />
          <div style={{ display: "inline-block", fontSize: 10, letterSpacing: "0.2em", textTransform: "uppercase", color: B.silver, border: `1px solid ${B.silver}66`, padding: "4px 14px", borderRadius: 20 }}>
            {content.login.badge}
          </div>
        </div>
        <div style={{ padding: "32px 36px 36px" }}>
          <div style={{ fontFamily: B.hfont, fontSize: 22, fontWeight: 600, color: B.dark, marginBottom: 6 }}>{content.login.welcomeTitle}</div>
          <div style={{ fontSize: 13, color: "#777", marginBottom: 24, lineHeight: 1.6 }}>{content.login.welcomeText}</div>
          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", color: "#888", marginBottom: 5 }}>Store Name</div>
            <select value={store} onChange={e => setStore(e.target.value)}
              style={{ width: "100%", padding: "10px 12px", border: `1.5px solid ${B.silver}`, fontSize: 13, color: B.dark, background: "#fff", fontFamily: B.bfont, outline: "none", borderRadius: 2 }}>
              <option value="">Select your store…</option>
              {STORES.map(s => <option key={s} value={s}>{s}</option>)}
              <option value="Admin — Krystal">Admin — Krystal</option>
            </select>
          </div>
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", color: "#888", marginBottom: 5 }}>Access Code</div>
            <input type="password" value={code} onChange={e => setCode(e.target.value)} placeholder="Enter your access code"
              onKeyDown={e => e.key === "Enter" && handleLogin()}
              style={{ width: "100%", padding: "10px 12px", border: `1.5px solid ${B.silver}`, fontSize: 13, color: B.dark, background: "#fff", fontFamily: B.bfont, outline: "none", borderRadius: 2 }} />
          </div>
          {err && <div style={{ background: "#fff5f5", borderLeft: "3px solid #c0392b", color: "#a33", padding: "10px 12px", fontSize: 13, marginBottom: 14 }}>{err}</div>}
          <Btn B={B} onClick={handleLogin} disabled={loading} style={{ width: "100%", justifyContent: "center" }}>
            {loading ? "Signing in…" : "Access Training Portal"}
          </Btn>
          <div style={{ textAlign: "center", marginTop: 18, fontSize: 12, color: "#999" }}>
            {content.login.needAccessText} <strong style={{ color: B.dark }}>{content.login.needAccessNumber}</strong>
          </div>
        </div>
      </div>
    </div>
  );
}

// VIDEO MODAL
// ════════════════════════════════════════════════════════════════════
function VideoModal({ video, onClose, onWatch, B }) {
  useEffect(() => { onWatch(video.id); }, []);
  const isEmbed = video.url && (video.url.includes("youtube") || video.url.includes("youtu.be") || video.url.includes("vimeo") || video.url.includes("drive.google"));

  function getEmbedUrl(url) {
    if (url.includes("youtu.be/")) return "https://www.youtube.com/embed/" + url.split("youtu.be/")[1].split("?")[0];
    if (url.includes("youtube.com/watch")) { const u = new URL(url); return "https://www.youtube.com/embed/" + u.searchParams.get("v"); }
    if (url.includes("vimeo.com/")) return "https://player.vimeo.com/video/" + url.split("vimeo.com/")[1].split("?")[0];
    if (url.includes("drive.google.com")) return url.replace("/view", "/preview");
    return url;
  }

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}
      onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="fade-in" style={{ background: "#fff", width: 720, maxWidth: "100%", padding: 32, position: "relative" }}>
        <button onClick={onClose} style={{ position: "absolute", top: 14, right: 16, background: "none", border: "none", cursor: "pointer", color: "#999" }}><Icon.close /></button>
        <div style={{ fontSize: 11, letterSpacing: "0.16em", textTransform: "uppercase", color: B.gold, marginBottom: 6 }}>{video.tag}</div>
        <div style={{ fontFamily: B.hfont, fontSize: 20, fontWeight: 600, color: B.dark, marginBottom: 8 }}>{video.title}</div>
        <div style={{ fontSize: 13, color: "#666", marginBottom: 20, lineHeight: 1.6 }}>{video.desc}</div>
        {video.url && isEmbed ? (
          <div style={{ aspectRatio: "16/9", background: "#000" }}>
            <iframe src={getEmbedUrl(video.url)} style={{ width: "100%", height: "100%", border: "none" }} allowFullScreen />
          </div>
        ) : video.url ? (
          <div style={{ background: B.cream, padding: 20, textAlign: "center" }}>
            <div style={{ marginBottom: 12, color: "#555", fontSize: 13 }}>This video opens in a new tab.</div>
            <Btn B={B} onClick={() => window.open(video.url, "_blank")}>Open Video</Btn>
          </div>
        ) : (
          <div style={{ background: B.cream, border: `1.5px dashed ${B.silver}`, padding: 28, textAlign: "center" }}>
            <div style={{ fontSize: 13, color: "#888", lineHeight: 1.7 }}>
              📎 <strong>Video coming soon.</strong><br />
              Add this video link from the Admin Editor → Videos tab.
            </div>
          </div>
        )}
        <div style={{ marginTop: 18, textAlign: "right" }}>
          <Btn B={B} onClick={onClose} variant="ghost" small>Close</Btn>
        </div>
      </div>
    </div>
  );
}

// FEEDBACK FORM
// ════════════════════════════════════════════════════════════════════
function FeedbackForm({ content, B }) {
  const [name, setName] = useState("");
  const [store, setStore] = useState("");
  const [type, setType] = useState("");
  const [msg, setMsg] = useState("");
  const [sent, setSent] = useState(false);

  function submit() {
    if (!msg.trim()) { alert("Please enter your feedback."); return; }
    const recipient = (content.feedbackSection && content.feedbackSection.recipient) || (content.footer && content.footer.contactEmail) || "krystal@stoneoutdoor.com.au";
    const subject = encodeURIComponent("Nuway Training Portal — Feedback from " + (name || "Anonymous"));
    const body = encodeURIComponent(
      "Name: " + (name || "(not provided)") + "\n" +
      "Store: " + (store || "(not provided)") + "\n" +
      "Feedback type: " + (type || "(not provided)") + "\n\n" +
      "Feedback:\n" + msg + "\n\n" +
      "— Sent from the Nuway Training Portal"
    );
    window.location.href = `mailto:${recipient}?subject=${subject}&body=${body}`;
    setSent(true);
    setName(""); setStore(""); setType(""); setMsg("");
  }

  if (sent) return (
    <div style={{ background: "#fff", border: `1px solid ${B.silver}`, padding: 32 }}>
      <div style={{ padding: "12px 14px", background: "#f0f7ee", borderLeft: "3px solid #5a9e4a", color: "#3a6630", fontSize: 14 }}>
        ✓ {content.feedbackSection.confirm}
      </div>
      <Btn B={B} onClick={() => setSent(false)} variant="ghost" small style={{ marginTop: 14 }}>Submit another</Btn>
    </div>
  );

  return (
    <div style={{ background: "#fff", border: `1px solid ${B.silver}`, padding: 32 }}>
      <div style={{ fontSize: 14, color: "#888", lineHeight: 1.7, marginBottom: 22, maxWidth: 560 }}>
        {content.feedbackSection.intro}
      </div>
      <div className="twocol" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 14 }}>
        <Input B={B} label="Your Name" value={name} onChange={setName} placeholder="Name" />
        <Input B={B} label="Store Name" value={store} onChange={setStore} placeholder="Nuway store" />
      </div>
      <Input B={B} label="Feedback Type" value={type} onChange={setType} placeholder="e.g. Video idea, counter folder suggestion..." />
      <Input B={B} label="Your Feedback" value={msg} onChange={setMsg} placeholder="Tell us what you'd like to see added or changed..." rows={4} />
      <Btn B={B} onClick={submit}>Submit Feedback</Btn>
    </div>
  );
}

        {/* FEEDBACK */}
        {content.feedbackSection.show && (

      </div>

      {/* Footer */}
      <div style={{ background: B.dark, color: B.silver + "80", textAlign: "center", padding: "22px 40px", fontSize: 12 }}>
        {content.footer.text} ·{" "}

      {activeVideo && <VideoModal video={activeVideo} onClose={() => setActiveVideo(null)} onWatch={onVideoWatch} B={B} />}

// STAFF CODE CHANGER
// ════════════════════════════════════════════════════════════════════
function StaffCodeChanger({ current, onSave, B }) {
  const [cur, setCur] = useState("");
  const [nw, setNw] = useState("");
  const [con, setCon] = useState("");
  const [msg, setMsg] = useState(null);

  function change() {
    if (cur !== current) { setMsg({ ok: false, text: "Current staff code is incorrect." }); return; }
    if (nw.length < 6) { setMsg({ ok: false, text: "New code must be at least 6 characters." }); return; }
    if (nw !== con) { setMsg({ ok: false, text: "New codes do not match." }); return; }
    onSave(nw);
    setCur(""); setNw(""); setCon("");
    setMsg({ ok: true, text: "Staff code updated to: " + nw });
  }

  return (
    <div>
      <Input B={B} label="Current Staff Code" value={cur} onChange={setCur} type="password" />
      <Input B={B} label="New Staff Code" value={nw} onChange={setNw} type="password" hint="Minimum 6 characters" />
      <Input B={B} label="Confirm New Code" value={con} onChange={setCon} type="password" />
      <Btn B={B} onClick={change} style={{ width: "100%", justifyContent: "center" }}>Update Staff Code</Btn>
      {msg && (
        <div style={{ marginTop: 10, padding: "10px 12px", fontSize: 13, background: msg.ok ? "#f0f7ee" : "#fff5f5", borderLeft: `3px solid ${msg.ok ? "#5a9e4a" : "#c0392b"}`, color: msg.ok ? "#3a6630" : "#a33" }}>
          {msg.ok ? "✓" : "✕"} {msg.text}
        </div>
      )}
    </div>
  );
}

function AdminPanel({ content, onSave, onClose, logins, videoStats, completions = [], B }) {
  const [tab, setTab] = useState("analytics");
  const [draft, setDraft] = useState(JSON.parse(JSON.stringify(content)));
  const [toast, setToast] = useState("");

  // Apply theme live as user edits
  useEffect(() => { applyTheme(draft.theme); }, [draft.theme]);

  function showToast(msg) { setToast(msg); setTimeout(() => setToast(""), 2800); }
  function up(key, val) { setDraft(d => ({ ...d, [key]: val })); }
  function upDeep(path, val) {
    setDraft(d => {
      const cp = JSON.parse(JSON.stringify(d));
      const parts = path.split(".");
      let cur = cp;
      for (let i = 0; i < parts.length - 1; i++) cur = cur[parts[i]];
      cur[parts[parts.length - 1]] = val;
      return cp;
    });
  }
  async function saveAll() {
    const result = await onSave(draft);
    if (result && result.ok === false) {
      if (result.quota) {
        alert("⚠ Save failed — browser storage is full.\n\nThis usually means too many uploaded PDFs/images. Fix:\n• Clear large uploads (use the Clear button on thumbnails)\n• For PDFs, drop the file into the pdfs/ folder and type 'pdfs/FILENAME.pdf' in the field instead of uploading\n• Smaller images work better as thumbnails (under 200KB)");
      } else {
        alert("Save failed: " + (result.message || "unknown error"));
      }
    } else {
      showToast("All changes saved! (" + Math.round(storageBytes()/1024) + "KB used)");
    }
  }
  function resetTheme() {
    upDeep("theme", JSON.parse(JSON.stringify(DEFAULT_CONTENT.theme)));
    showToast("Theme reset to brand defaults");
  }

  // Generic list editors
  function listAdd(path, item) { upDeep(path, [...path.split(".").reduce((o, k) => o[k], draft), item]); }
  function listRemove(path, idx) {
    const arr = [...path.split(".").reduce((o, k) => o[k], draft)];
    arr.splice(idx, 1);
    upDeep(path, arr);
  }
  function listMove(path, idx, dir) {
    const arr = [...path.split(".").reduce((o, k) => o[k], draft)];
    const j = idx + dir;
    if (j < 0 || j >= arr.length) return;
    [arr[idx], arr[j]] = [arr[j], arr[idx]];
    upDeep(path, arr);
  }
  function listSet(path, idx, key, val) {
    const arr = [...path.split(".").reduce((o, k) => o[k], draft)];
    arr[idx] = { ...arr[idx], [key]: val };
    upDeep(path, arr);
  }

  // Analytics calc
  const loginsByStore = {};
  STORES.forEach(s => { loginsByStore[s] = 0; });
  logins.forEach(l => { if (loginsByStore[l.store] !== undefined) loginsByStore[l.store]++; });
  const totalLogins = logins.length;
  const last7 = logins.filter(l => Date.now() - l.ts < 7 * 86400000).length;
  const activeStores = Object.values(loginsByStore).filter(v => v > 0).length;

  const tabs = [
    { id: "analytics", label: "Analytics" },
    { id: "theme",     label: "Theme" },
    { id: "login",     label: "Login" },
    { id: "hero",      label: "Hero" },
    { id: "videos",    label: "Videos" },
    { id: "downloads", label: "Downloads" },
    { id: "complaint", label: "Complaint" },
    { id: "procedures", label: "Procedures" },
    { id: "contacts",  label: "Contacts" },
    { id: "checklist", label: "Checklist" },
    { id: "feedback",  label: "Feedback" },
    { id: "footer",    label: "Footer" },
    { id: "security",  label: "Security" },
  ];

  const Section = ({ title }) => (
    <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.14em", textTransform: "uppercase", color: B.dark, margin: "22px 0 12px", paddingBottom: 7, borderBottom: `1px solid ${B.silver}` }}>{title}</div>
  );
  const Note = ({ children }) => (
    <div style={{ fontSize: 12, color: "#666", background: B.cream, padding: "10px 12px", borderLeft: `3px solid ${B.gold}`, marginBottom: 16, lineHeight: 1.6 }}>{children}</div>
  );
  const Toggle = ({ on, onChange, label }) => (
    <label style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14, cursor: "pointer" }}>
      <span style={{ position: "relative", width: 36, height: 20, background: on ? B.dark : B.silver, borderRadius: 10, transition: "background 0.2s", flexShrink: 0 }}>
        <span style={{ position: "absolute", top: 2, left: on ? 18 : 2, width: 16, height: 16, background: "#fff", borderRadius: "50%", transition: "left 0.2s" }} />
      </span>
      <input type="checkbox" checked={on} onChange={e => onChange(e.target.checked)} style={{ display: "none" }} />
      <span style={{ fontSize: 13, color: B.dark, fontWeight: 500 }}>{label}</span>
    </label>
  );

  // Color picker row
  const ColorRow = ({ label, path }) => {
    const val = path.split(".").reduce((o, k) => o[k], draft);
    return (
      <div style={{ marginBottom: 12 }}>
        <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase", color: "#888", marginBottom: 5 }}>{label}</div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <input type="color" value={val} onChange={e => upDeep(path, e.target.value)}
            style={{ width: 50, height: 34, padding: 2, border: `1.5px solid ${B.silver}`, cursor: "pointer", background: "#fff" }} />
          <input type="text" value={val} onChange={e => upDeep(path, e.target.value)}
            style={{ flex: 1, padding: "8px 10px", border: `1.5px solid ${B.silver}`, fontSize: 13, color: B.dark, background: "#fff", outline: "none", borderRadius: 2, fontFamily: "monospace" }} />
        </div>
      </div>
    );
  };

  return (
    <>
      <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.3)", zIndex: 400 }} />
      <div className="slide-in" style={{ position: "fixed", top: 0, right: 0, bottom: 0, width: 460, maxWidth: "100vw", background: "#fff", boxShadow: "-6px 0 40px rgba(0,0,0,0.2)", zIndex: 500, display: "flex", flexDirection: "column" }}>
        <div style={{ background: B.dark, padding: "16px 22px", display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0 }}>
          <div>
            <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: "#fff" }}>Admin Editor</div>
            <div style={{ fontSize: 11, color: B.silver, marginTop: 2 }}>Krystal Adamson · Stone &amp; Outdoor</div>
          </div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "rgba(255,255,255,0.7)", cursor: "pointer", fontSize: 20, lineHeight: 1 }}>✕</button>
        </div>

        <div style={{ display: "flex", borderBottom: `1px solid ${B.silver}`, flexShrink: 0, overflowX: "auto" }}>
          {tabs.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{
              flex: "0 0 auto", padding: "10px 14px", fontSize: 10, fontWeight: 600, letterSpacing: "0.05em", textTransform: "uppercase",
              cursor: "pointer", border: "none", background: "none", fontFamily: B.bfont,
              color: tab === t.id ? B.dark : "#999", borderBottom: tab === t.id ? `2px solid ${B.gold}` : "2px solid transparent",
              transition: "all 0.2s", whiteSpace: "nowrap"
            }}>{t.label}</button>
          ))}
        </div>

        <div style={{ flex: 1, overflowY: "auto", padding: 20 }}>

          {/* ANALYTICS */}
          {tab === "analytics" && (
            <div>
              <Note>Live usage data from all 11 Nuway stores. Each store login is recorded, plus video views.</Note>
              <Section title="Overview" />
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 20 }}>
                {[
                  { label: "Total Logins", value: totalLogins },
                  { label: "Last 7 Days", value: last7 },
                  { label: "Active Stores", value: `${activeStores}/11` },
                ].map(m => (
                  <div key={m.label} style={{ background: B.cream, padding: "12px 10px", textAlign: "center", borderRadius: 2 }}>
                    <div style={{ fontSize: 22, fontWeight: 600, color: B.dark }}>{m.value}</div>
                    <div style={{ fontSize: 10, color: "#888", textTransform: "uppercase", letterSpacing: "0.08em", marginTop: 2 }}>{m.label}</div>
                  </div>
                ))}
              </div>
              <Section title="Logins by Store" />
              {STORES.map(s => {
                const count = loginsByStore[s] || 0;
                const pct = totalLogins ? Math.round((count / Math.max(...Object.values(loginsByStore), 1)) * 100) : 0;
                return (
                  <div key={s} style={{ marginBottom: 10 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 4 }}>
                      <span style={{ color: B.dark, fontWeight: count > 0 ? 600 : 400 }}>{s}</span>
                      <span style={{ color: count > 0 ? B.dark : "#bbb", fontWeight: 600 }}>{count}</span>
                    </div>
                    <div style={{ background: B.silver, height: 5, borderRadius: 2 }}>
                      <div style={{ width: `${pct}%`, height: "100%", background: B.gold, borderRadius: 2, transition: "width 0.6s" }} />
                    </div>
                  </div>
                );
              })}
              <Section title="Video Watch Counts" />
              {draft.videos.map(v => {
                const count = videoStats[v.id] || 0;
                return (
                  <div key={v.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: `1px solid ${B.cream}`, fontSize: 13 }}>
                    <span style={{ color: B.dark }}>{v.title}</span>
                    <span style={{ fontWeight: 600, color: count > 0 ? B.dark : "#bbb", background: B.cream, padding: "2px 10px", borderRadius: 20, fontSize: 12 }}>{count} views</span>
                  </div>
                );
              })}
              <Section title="Training Completions" />
              {completions.length === 0 && <div style={{ fontSize: 12, color: "#999", marginBottom: 14 }}>No completions logged yet. Staff submit their name &amp; role from the bottom of the Checklist section.</div>}
              {completions.length > 0 && (
                <div style={{ background: B.cream, padding: "10px 12px", marginBottom: 12, fontSize: 12, color: B.dark, borderLeft: `3px solid ${B.gold}` }}>
                  <strong>{completions.length}</strong> staff member{completions.length === 1 ? "" : "s"} marked complete · across <strong>{new Set(completions.map(c => c.store)).size}</strong> store{new Set(completions.map(c => c.store)).size === 1 ? "" : "s"}
                </div>
              )}
              {[...completions].reverse().map((c, i) => (
                <div key={i} style={{ background: "#fff", border: `1px solid ${B.silver}`, padding: "10px 12px", marginBottom: 8, borderRadius: 2 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                    <span style={{ color: B.dark, fontWeight: 600, fontSize: 13 }}>{c.name}</span>
                    <span style={{ fontSize: 10, letterSpacing: "0.08em", color: B.gold, textTransform: "uppercase", fontWeight: 700 }}>{c.role}</span>
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#888" }}>
                    <span>{c.store}</span>
                    <span>{c.itemsDone}/{c.itemsTotal} items · {new Date(c.ts).toLocaleString("en-AU", { day: "2-digit", month: "short", year: "numeric" })}</span>
                  </div>
                </div>
              ))}
              <Section title="Recent Logins" />
              {logins.length === 0 && <div style={{ fontSize: 12, color: "#999" }}>No logins recorded yet.</div>}
              {[...logins].reverse().slice(0, 30).map((l, i) => (
                <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "7px 0", borderBottom: `1px solid ${B.cream}`, fontSize: 12 }}>
                  <span style={{ color: B.dark, fontWeight: 500 }}>{l.store}</span>
                  <span style={{ color: "#999" }}>{new Date(l.ts).toLocaleString("en-AU", { day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" })}</span>
                </div>
              ))}
            </div>
          )}

          {/* THEME */}
          {tab === "theme" && (
            <div>
              <Note>Colours and fonts update live as you change them. Click "Save All Changes" at the bottom to make changes permanent.</Note>
              <Section title="Logo & Header" />
              <Input B={B} label="Logo Image URL" value={draft.logoUrl} onChange={v => up("logoUrl", v)} placeholder="https://your-logo.com/logo.svg" />
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", color: "#888", marginBottom: 5 }}>Logo Height in Header — {draft.logoHeight || 140}px <span style={{ color: "#999", fontWeight: 400 }}>(~{Math.round((draft.logoHeight || 140) / 96 * 10) / 10}″)</span></div>
                <input type="range" min="40" max="240" value={draft.logoHeight || 140} onChange={e => up("logoHeight", parseInt(e.target.value))} style={{ width: "100%", accentColor: B.dark }} />
              </div>
              {draft.logoUrl && (
                <div style={{ background: draft.theme.colorDark, padding: 14, textAlign: "center", marginBottom: 14 }}>
                  <img src={draft.logoUrl} alt="Logo preview" style={{ height: draft.logoHeight || 140, maxWidth: "100%", objectFit: "contain" }} />
                </div>
              )}
              <Section title="Social Links in Header" />
              <Input B={B} label="Facebook URL" value={(draft.social && draft.social.facebook) || ""} onChange={v => upDeep("social.facebook", v)} placeholder="https://www.facebook.com/..." />
              <Input B={B} label="Instagram URL" value={(draft.social && draft.social.instagram) || ""} onChange={v => upDeep("social.instagram", v)} placeholder="https://www.instagram.com/..." />
              <Input B={B} label="Website URL" value={(draft.social && draft.social.website) || ""} onChange={v => upDeep("social.website", v)} placeholder="https://www.stoneoutdoor.com.au" />
              <div style={{ fontSize: 11, color: "#999", marginBottom: 14, marginTop: -8 }}>Clear a field to hide that icon from the header.</div>
              <Section title="Colours" />
              <ColorRow label="Primary Dark — header, buttons, footer" path="theme.colorDark" />
              <ColorRow label="Background Cream" path="theme.colorCream" />
              <ColorRow label="Accent Gold — highlights, links" path="theme.colorGold" />
              <ColorRow label="Border / Silver" path="theme.colorSilver" />
              <ColorRow label="Card Background" path="theme.colorWhite" />
              <ColorRow label="Body Text" path="theme.colorText" />
              <Btn B={B} variant="ghost" small onClick={resetTheme} style={{ marginTop: 4 }}>
                <Icon.reset /> Reset to Brand Defaults
              </Btn>

              <Section title="Fonts" />
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", color: "#888", marginBottom: 5 }}>Heading Font</div>
                <select value={draft.theme.headingFont} onChange={e => upDeep("theme.headingFont", e.target.value)}
                  style={{ width: "100%", padding: "9px 12px", border: `1.5px solid ${B.silver}`, fontSize: 13, color: B.dark, background: "#fff", outline: "none", borderRadius: 2, fontFamily: B.bfont }}>
                  {FONTS.map(f => <option key={f.v} value={f.v}>{f.n}</option>)}
                </select>
                <div style={{ marginTop: 8, padding: "10px 12px", background: B.cream, fontFamily: draft.theme.headingFont, fontSize: 18, color: B.dark, fontWeight: 600 }}>
                  {draft.hero.title.slice(0, 60)}…
                </div>
              </div>
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", color: "#888", marginBottom: 5 }}>Body Font</div>
                <select value={draft.theme.bodyFont} onChange={e => upDeep("theme.bodyFont", e.target.value)}
                  style={{ width: "100%", padding: "9px 12px", border: `1.5px solid ${B.silver}`, fontSize: 13, color: B.dark, background: "#fff", outline: "none", borderRadius: 2, fontFamily: B.bfont }}>
                  {FONTS.map(f => <option key={f.v} value={f.v}>{f.n}</option>)}
                </select>
                <div style={{ marginTop: 8, padding: "10px 12px", background: B.cream, fontFamily: draft.theme.bodyFont, fontSize: 13, color: B.dark }}>
                  Sample body text shows here in the selected font.
                </div>
              </div>
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", color: "#888", marginBottom: 5 }}>
                  Base Font Size — {draft.theme.fontSize}px
                </div>
                <input type="range" min="13" max="19" value={draft.theme.fontSize}
                  onChange={e => upDeep("theme.fontSize", parseInt(e.target.value))}
                  style={{ width: "100%", accentColor: B.dark }} />
              </div>
            </div>
          )}

          {/* LOGIN */}
          {tab === "login" && (
            <div>
              <Note>Edit the wording on the login screen.</Note>
              <Input B={B} label="Badge Text (under logo)" value={draft.login.badge} onChange={v => upDeep("login.badge", v)} />
              <Input B={B} label="Welcome Heading" value={draft.login.welcomeTitle} onChange={v => upDeep("login.welcomeTitle", v)} />
              <Input B={B} label="Welcome Description" value={draft.login.welcomeText} onChange={v => upDeep("login.welcomeText", v)} rows={3} />
              <Input B={B} label="Footer Help Text" value={draft.login.needAccessText} onChange={v => upDeep("login.needAccessText", v)} />
              <Input B={B} label="Footer Help Phone" value={draft.login.needAccessNumber} onChange={v => upDeep("login.needAccessNumber", v)} />
            </div>
          )}

          {/* HERO */}
          {tab === "hero" && (
            <div>
              <Note>The big banner at the top of the portal.</Note>
              <Input B={B} label="Eyebrow Label" value={draft.hero.eyebrow} onChange={v => upDeep("hero.eyebrow", v)} hint="Small text above the main heading" />
              <Input B={B} label="Main Heading" value={draft.hero.title} onChange={v => upDeep("hero.title", v)} rows={2} />
              <Input B={B} label="Description" value={draft.hero.description} onChange={v => upDeep("hero.description", v)} rows={3} />
              <Section title="Hero Tags (chips below description)" />
              <Note>Drag-style reorder with the up/down arrows. Each tag scrolls to a section when clicked. Tag wording is matched to the section (e.g. "Procedures" → Procedures section).</Note>
              {draft.hero.tags.map((t, i) => (
                <div key={i} style={{ display: "flex", gap: 6, marginBottom: 8, alignItems: "center" }}>
                  <input value={t} onChange={e => {
                    const arr = [...draft.hero.tags]; arr[i] = e.target.value; upDeep("hero.tags", arr);
                  }} style={{ flex: 1, padding: "8px 10px", border: `1.5px solid ${B.silver}`, fontSize: 13, fontFamily: B.bfont, background: "#fff", borderRadius: 2 }} />
                  <button disabled={i === 0} onClick={() => { const arr = [...draft.hero.tags]; [arr[i-1], arr[i]] = [arr[i], arr[i-1]]; upDeep("hero.tags", arr); }} style={{ background: "none", border: `1.5px solid ${B.silver}`, color: i === 0 ? "#ccc" : B.dark, cursor: i === 0 ? "default" : "pointer", padding: "6px 8px" }}><Icon.up /></button>
                  <button disabled={i === draft.hero.tags.length - 1} onClick={() => { const arr = [...draft.hero.tags]; [arr[i+1], arr[i]] = [arr[i], arr[i+1]]; upDeep("hero.tags", arr); }} style={{ background: "none", border: `1.5px solid ${B.silver}`, color: i === draft.hero.tags.length - 1 ? "#ccc" : B.dark, cursor: i === draft.hero.tags.length - 1 ? "default" : "pointer", padding: "6px 8px" }}><Icon.down /></button>
                  <button onClick={() => upDeep("hero.tags", draft.hero.tags.filter((_, j) => j !== i))} style={{ background: "none", border: `1.5px solid ${B.silver}`, color: "#c0392b", cursor: "pointer", padding: "6px 8px" }}><Icon.trash /></button>
                </div>
              ))}
              <Btn B={B} variant="outline" small onClick={() => upDeep("hero.tags", [...draft.hero.tags, "New tag"])}><Icon.plus /> Add tag</Btn>
            </div>
          )}

          {/* VIDEOS */}
          {tab === "videos" && (
            <div>
              <Toggle on={draft.videosSection.show} onChange={v => upDeep("videosSection.show", v)} label="Show Videos section" />
              <Input B={B} label="Section Step Label" value={draft.videosSection.step} onChange={v => upDeep("videosSection.step", v)} />
              <Input B={B} label="Section Title" value={draft.videosSection.title} onChange={v => upDeep("videosSection.title", v)} />
              <Note>Add YouTube, Vimeo, or Google Drive share links. Leave URL blank to show "coming soon" placeholder.</Note>
              {draft.videos.map((v, i) => (
                <div key={v.id} style={{ background: B.cream, padding: 14, marginBottom: 14, borderRadius: 2 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                    <div style={{ fontSize: 12, fontWeight: 600, color: B.dark }}>Video {i + 1}</div>
                    <div style={{ display: "flex", gap: 4 }}>
                      <button disabled={i === 0} onClick={() => listMove("videos", i, -1)} style={{ background: "none", border: "none", color: i === 0 ? "#ccc" : B.dark, cursor: i === 0 ? "default" : "pointer" }}><Icon.up /></button>
                      <button disabled={i === draft.videos.length - 1} onClick={() => listMove("videos", i, 1)} style={{ background: "none", border: "none", color: i === draft.videos.length - 1 ? "#ccc" : B.dark, cursor: i === draft.videos.length - 1 ? "default" : "pointer" }}><Icon.down /></button>
                      <button onClick={() => listRemove("videos", i)} style={{ background: "none", border: "none", color: "#c0392b", cursor: "pointer" }}><Icon.trash /></button>
                    </div>
                  </div>
                  <Input B={B} label="Title" value={v.title} onChange={val => listSet("videos", i, "title", val)} />
                  <Input B={B} label="Tag / Audience" value={v.tag} onChange={val => listSet("videos", i, "tag", val)} />
                  <Input B={B} label="Description" value={v.desc} onChange={val => listSet("videos", i, "desc", val)} rows={2} />
                  <Input B={B} label="Video URL" value={v.url} onChange={val => listSet("videos", i, "url", val)} placeholder="https://youtube.com/..." />
                  <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", color: "#888", marginBottom: 5 }}>Thumbnail Image (optional)</div>
                  <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
                    <input type="text" value={v.thumbnail || ""} onChange={e => listSet("videos", i, "thumbnail", e.target.value)} placeholder="Image URL or click Upload"
                      style={{ flex: 1, padding: "8px 10px", border: `1.5px solid ${B.silver}`, fontSize: 12, fontFamily: B.bfont, background: "#fff", borderRadius: 2 }} />
                    <label style={{ display: "inline-flex", alignItems: "center", padding: "0 12px", border: `1.5px solid ${B.dark}`, background: B.dark, color: "#fff", fontSize: 11, fontWeight: 600, letterSpacing: "0.06em", textTransform: "uppercase", cursor: "pointer" }}>
                      Upload
                      <input type="file" accept="image/*" style={{ display: "none" }}
                        onChange={e => { const f = e.target.files[0]; if (!f) return; if (f.size > 2*1024*1024) { alert("Image too large (max 2MB)."); return; } const r = new FileReader(); r.onload = () => listSet("videos", i, "thumbnail", r.result); r.readAsDataURL(f); e.target.value = ""; }} />
                    </label>
                    {v.thumbnail && <button onClick={() => listSet("videos", i, "thumbnail", "")} style={{ padding: "0 10px", background: "none", border: `1.5px solid ${B.silver}`, color: "#c0392b", cursor: "pointer", fontSize: 11 }}>Clear</button>}
                  </div>
                  {v.thumbnail && <div style={{ marginBottom: 14, padding: 8, background: B.cream, fontSize: 11, color: B.dark }}>Preview: <img src={v.thumbnail} alt="thumb" style={{ maxWidth: "100%", maxHeight: 80, marginTop: 6, display: "block", border: `1px solid ${B.silver}` }} /></div>}
                </div>
              ))}

                        <option value="mail">Email</option>
                        <option value="globe">Website</option>
                      </select>
                      <input value={row.text} onChange={e => {
                        const items = [...card.items]; items[j] = { ...items[j], text: e.target.value }; listSet("contactsSection.cards", i, "items", items);
                      }} placeholder="Display text" style={{ padding: "6px 8px", border: `1.5px solid ${B.silver}`, fontSize: 12, fontFamily: B.bfont, background: "#fff", borderRadius: 2 }} />
                      <input value={row.href} onChange={e => {
                        const items = [...card.items]; items[j] = { ...items[j], href: e.target.value }; listSet("contactsSection.cards", i, "items", items);
                      }} placeholder="Link (tel:/mailto:/https:)" style={{ padding: "6px 8px", border: `1.5px solid ${B.silver}`, fontSize: 12, fontFamily: B.bfont, background: "#fff", borderRadius: 2 }} />
                      <button onClick={() => {
                        const items = card.items.filter((_, k) => k !== j); listSet("contactsSection.cards", i, "items", items);
                      }} style={{ background: "none", border: "none", color: "#c0392b", cursor: "pointer" }}><Icon.trash /></button>
                    </div>
                  ))}
                  <button onClick={() => listSet("contactsSection.cards", i, "items", [...(card.items||[]), { type: "phone", text: "", href: "" }])}
                    style={{ background: "none", border: `1px dashed ${B.silver}`, color: B.dark, padding: "5px 12px", fontSize: 11, fontFamily: B.bfont, cursor: "pointer", marginTop: 4 }}>+ Add item</button>
                  <Input B={B} label="Note (italic, below items)" value={card.note} onChange={v => listSet("contactsSection.cards", i, "note", v)} />
                </div>
              ))}
              <Btn B={B} variant="outline" onClick={() => listAdd("contactsSection.cards", { id: "c" + Date.now(), tag: "New", name: "Contact", role: "", items: [], note: "" })}><Icon.plus /> Add card</Btn>
            </div>
          )}

          {/* CHECKLIST */}
          {tab === "checklist" && (
            <div>
              <Toggle on={draft.checklistSection.show} onChange={v => upDeep("checklistSection.show", v)} label="Show Checklist section" />
              <Input B={B} label="Section Step Label" value={draft.checklistSection.step} onChange={v => upDeep("checklistSection.step", v)} />
              <Input B={B} label="Section Title" value={draft.checklistSection.title} onChange={v => upDeep("checklistSection.title", v)} />
              <Input B={B} label="Tracker Header" value={draft.checklistSection.trackerLabel} onChange={v => upDeep("checklistSection.trackerLabel", v)} />
              <Section title="Extra Checklist Items" />
              {draft.checklistSection.extras.map((it, i) => (
                <div key={it.id} style={{ display: "flex", gap: 6, marginBottom: 8 }}>
                  <input value={it.label} onChange={e => listSet("checklistSection.extras", i, "label", e.target.value)}
                    style={{ flex: 1, padding: "8px 10px", border: `1.5px solid ${B.silver}`, fontSize: 13, fontFamily: B.bfont, background: "#fff", borderRadius: 2 }} />
                  <button onClick={() => listRemove("checklistSection.extras", i)} style={{ background: "none", border: `1.5px solid ${B.silver}`, color: "#c0392b", cursor: "pointer", padding: "0 10px" }}><Icon.trash /></button>
                </div>
              ))}
              <Btn B={B} variant="outline" small onClick={() => listAdd("checklistSection.extras", { id: "x" + Date.now(), label: "New checklist item" })}><Icon.plus /> Add item</Btn>
              <Section title="Independent Training Process" />
              <Input B={B} label="Right-side Panel Title" value={draft.checklistSection.processTitle} onChange={v => upDeep("checklistSection.processTitle", v)} />
              {draft.checklistSection.process.map((row, i) => (
                <div key={i} style={{ background: B.cream, padding: 12, marginBottom: 10, borderRadius: 2 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: B.gold }}>Process {row.n}</div>
                    <button onClick={() => listRemove("checklistSection.process", i)} style={{ background: "none", border: "none", color: "#c0392b", cursor: "pointer" }}><Icon.trash /></button>
                  </div>
                  <Input B={B} label="Title" value={row.title} onChange={v => listSet("checklistSection.process", i, "title", v)} />
                  <Input B={B} label="Description" value={row.desc} onChange={v => listSet("checklistSection.process", i, "desc", v)} rows={2} />
                </div>
              ))}
              <Btn B={B} variant="outline" small onClick={() => listAdd("checklistSection.process", { n: draft.checklistSection.process.length + 1, title: "New", desc: "" })}><Icon.plus /> Add process step</Btn>
            </div>
          )}

          {/* FEEDBACK */}
          {tab === "feedback" && (
            <div>
              <Toggle on={draft.feedbackSection.show} onChange={v => upDeep("feedbackSection.show", v)} label="Show Feedback section" />
              <Input B={B} label="Section Step Label" value={draft.feedbackSection.step} onChange={v => upDeep("feedbackSection.step", v)} />
              <Input B={B} label="Section Title" value={draft.feedbackSection.title} onChange={v => upDeep("feedbackSection.title", v)} />
              <Input B={B} label="Intro Text" value={draft.feedbackSection.intro} onChange={v => upDeep("feedbackSection.intro", v)} rows={3} />
              <Input B={B} label="Confirmation Message (after submit)" value={draft.feedbackSection.confirm} onChange={v => upDeep("feedbackSection.confirm", v)} rows={2} />
            </div>
          )}

          {/* FOOTER */}
          {tab === "footer" && (
            <div>
              <Note>The dark footer at the bottom of every page.</Note>
              <Input B={B} label="Footer Text" value={draft.footer.text} onChange={v => upDeep("footer.text", v)} rows={2} />
              <Input B={B} label="Website Display Text" value={draft.footer.websiteText} onChange={v => upDeep("footer.websiteText", v)} />
              <Input B={B} label="Website URL" value={draft.footer.websiteUrl} onChange={v => upDeep("footer.websiteUrl", v)} />
              <Input B={B} label="Contact Name" value={draft.footer.contactName} onChange={v => upDeep("footer.contactName", v)} />
              <Input B={B} label="Contact Phone" value={draft.footer.contactPhone} onChange={v => upDeep("footer.contactPhone", v)} />
            </div>
          )}

          {/* SECURITY */}
          {tab === "security" && (
            <div>
              <Section title="Change Staff Access Code" />
              <Note>This updates the code for all 11 Nuway stores plus Nuway Operations. Share securely.</Note>
              <StaffCodeChanger B={B} current={draft.staffCode} onSave={code => { upDeep("staffCode", code); onSave({ ...draft, staffCode: code }); showToast("Staff code updated!"); }} />
              <Section title="How to Share the Portal" />
              <div style={{ fontSize: 12, color: "#555", lineHeight: 2, background: B.cream, padding: 14, borderRadius: 2 }}>
                <div><strong>Quickest — Netlify Drop (30 seconds):</strong></div>
                <div>1. Go to <a href="https://app.netlify.com/drop" target="_blank" style={{ color: B.dark }}>app.netlify.com/drop</a></div>
                <div>2. Drag this HTML file (and the pdfs/ folder) onto the page</div>
                <div>3. Get an instant link to send to all stores</div>
              </div>
              <Section title="Login Credentials" />
              <div style={{ fontSize: 12, color: "#555", background: B.cream, padding: 12, borderRadius: 2, lineHeight: 2 }}>
                <div>🔑 <strong>Admin code (you only):</strong> KrystalAdmin2026</div>
                <div>🔒 <strong>Current staff code:</strong> <strong style={{ color: B.dark }}>{draft.staffCode}</strong></div>
                <div style={{ fontSize: 11, color: "#999", marginTop: 6 }}>Staff see the portal only — no Admin Editor button.</div>
              </div>
            </div>
          )}
        </div>

        <div style={{ padding: 14, borderTop: `1px solid ${B.silver}`, flexShrink: 0, background: "#fff" }}>
          <Btn B={B} onClick={saveAll} style={{ width: "100%", justifyContent: "center" }}>Save All Changes</Btn>
        </div>
      </div>

      {toast && (
        <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", background: B.dark, color: B.cream, padding: "11px 22px", fontSize: 13, boxShadow: "0 6px 24px rgba(0,0,0,0.3)", zIndex: 9999, borderLeft: `3px solid ${B.gold}`, whiteSpace: "nowrap" }}>
          ✓ {toast}
        </div>
      )}
    </>
  );
}

function App() {
  const [session, setSession] = useState(null);
  const [content, setContent] = useState(null);
  const [adminOpen, setAdminOpen] = useState(false);
  const [logins, setLogins] = useState([]);
  const [videoStats, setVideoStats] = useState({});
  const [completions, setCompletions] = useState([]);
  const [loading, setLoading] = useState(true);

  function deepMerge(target, source) {
    const out = Array.isArray(target) ? [...target] : { ...target };
    for (const key in source) {
      if (source[key] && typeof source[key] === "object" && !Array.isArray(source[key])) {
        out[key] = deepMerge(target[key] || {}, source[key]);
      } else {
        out[key] = source[key];
      }
    }
    return out;
  }

  useEffect(() => {
    async function init() {
      const saved = await load("content");
      const merged = saved ? deepMerge(DEFAULT_CONTENT, saved) : DEFAULT_CONTENT;
      setContent(merged);
      applyTheme(merged.theme);
      setLogins((await load("logins")) || []);
      setVideoStats((await load("videoStats")) || {});
      setCompletions((await load("completions")) || []);
      setLoading(false);
    }
    init();
  }, []);

  async function handleSave(newContent) {
    const result = await save("content", newContent);
    if (result && result.ok) {
      setContent(newContent);
      applyTheme(newContent.theme);
    }
    return result;
  }
  async function handleVideoWatch(videoId) {
    const updated = { ...videoStats, [videoId]: (videoStats[videoId] || 0) + 1 };
    setVideoStats(updated);
    await save("videoStats", updated);
  }
  async function handleCompletion(record) {
    const updated = [...completions, { ...record, ts: Date.now() }];
    setCompletions(updated);
    await save("completions", updated);
  }
  async function handleLogin(sess) {
    setSession(sess);
    setLogins((await load("logins")) || []);
    setVideoStats((await load("videoStats")) || {});
    setCompletions((await load("completions")) || []);
  }

  const B = useMemo(() => content ? makeB(content.theme) : makeB(DEFAULT_CONTENT.theme), [content]);

  if (loading || !content) return (
    <div style={{ minHeight: "100vh", background: B.dark, display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div style={{ textAlign: "center" }}>
        <div style={{ width: 40, height: 40, border: `3px solid ${B.silver}40`, borderTop: `3px solid ${B.silver}`, borderRadius: "50%", animation: "spin 0.8s linear infinite", margin: "0 auto 16px" }} />
        <div style={{ color: B.silver, fontSize: 13, letterSpacing: "0.1em" }}>Loading portal…</div>
      </div>
    </div>
  );

  if (!session) return <LoginScreen onLogin={handleLogin} content={content} B={B} />;

  return (
    <>
      <Portal session={session} content={content} onLogout={() => setSession(null)} onAdminOpen={() => setAdminOpen(true)} onVideoWatch={handleVideoWatch} videoStats={videoStats} onCompletion={handleCompletion} B={B} />
      {adminOpen && session.isAdmin && (
        <AdminPanel content={content} onSave={handleSave} onClose={() => setAdminOpen(false)} logins={logins} videoStats={videoStats} completions={completions} B={B} />
      )}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

window.addEventListener("error", function(e){
  let div = document.getElementById("__err");
  if (!div) {
    div = document.createElement("div");
    div.id = "__err";
    div.style.cssText = "position:fixed;bottom:0;left:0;right:0;background:#a33;color:#fff;padding:14px 20px;font-family:monospace;font-size:12px;z-index:99999;max-height:30vh;overflow:auto;border-top:3px solid #fff";
    document.body.appendChild(div);
  }
  div.innerHTML += "<div>⚠ "+ (e.message || e.error) +" — at "+ (e.filename||"?") +":"+ (e.lineno||"?") +"</div>";
});
</script>
</body>
</html>
